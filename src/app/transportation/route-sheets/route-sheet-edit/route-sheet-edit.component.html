<app-simple-content-container>
  <div id="content">
    @if (editActive()) {
      <app-general-setup
        #generalSetup
        [routeSheet]="initialValue()"
        (update)="onUpdate($event)"
        (create)="onCreate($event)"
        (cancel)="editActive.set(false)"
      />
    } @else {
      <app-general-info
        [routeSheet]="initialValue()"
        (edit)="editActive.set(true)"
        (delete)="onDelete()"
        [busy]="busy()"
      />
    }

    @if (initialValue()._id) {
      <app-fuel-purchases
        [routeSheet]="initialValue()"
        (update)="onUpdate({ fuelPurchases: $event })"
        [busy]="busy()"
        [disabled]="editActive()"
      />
      <app-route-trips
        [routeSheet]="initialValue()"
        (update)="onUpdate({ trips: $event })"
        [busy]="busy()"
        [disabled]="editActive()"
      />
    }
  </div>
</app-simple-content-container>
