<h2 mat-dialog-title>Paroles nomaiņa</h2>

<mat-dialog-content>
  <app-password-input-group [formField]="passwordForm.password"></app-password-input-group>
</mat-dialog-content>

<mat-dialog-actions>
  <button
    matButton="elevated"
    type="submit"
    [disabled]="passwordForm().valid() === false"
    [mat-dialog-close]="passwordForm.password().value()"
  >
    Mainīt
  </button>
  <button matButton mat-dialog-close class="tertiary">Atcelt</button>
</mat-dialog-actions>
