@if (!hidden()) {
  <div cdkMonitorSubtreeFocus (cdkFocusChange)="touched.set(true)">
    <!-- Parole 1 -->
    <div>
      <mat-form-field>
        <mat-label> Parole </mat-label>
        <input
          #passwordInput
          #passwordMatInput="matInput"
          matInput
          [value]="password()"
          (input)="onPasswordInput(passwordInput.value)"
          (blur)="onPasswordBlur()"
          [type]="hide ? 'password' : 'text'"
          [required]="required()"
          [disabled]="disabled()"
          [errorStateMatcher]="passwordErrorMatcher"
          [minLength]="minLength()"
        />
        <button matIconButton matSuffix (click)="hide = !hide" tabindex="-1">
          <mat-icon>
            {{ hide ? 'visibility_off' : 'visibility_on' }}
          </mat-icon>
        </button>
        <mat-error>
          @for (error of errors(); track $index) {
            {{ error.message }}
          }
        </mat-error>
      </mat-form-field>
    </div>

    <!-- Parole 2 -->
    <div>
      <mat-form-field>
        <mat-label> Parole atkārtoti </mat-label>
        <input
          #confirmationInput
          matInput
          #confirmationMatInput="matInput"
          [value]="confirmation()"
          (input)="onConfirmationInput(confirmationInput.value)"
          (blur)="onConfirmationBlur()"
          [type]="hide ? 'password' : 'text'"
          [required]="required()"
          [disabled]="disabled()"
          [errorStateMatcher]="confirmationErrorMatcher"
        />
        @if (confirmationError()) {
          <mat-error> Parolēm jāsakrīt! </mat-error>
        }
      </mat-form-field>
    </div>
  </div>
}
