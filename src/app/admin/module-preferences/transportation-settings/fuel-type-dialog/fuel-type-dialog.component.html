<h2 mat-dialog-title>Degvielas veids</h2>
<form [formRoot]="form">
  <mat-dialog-content>
    <section>
      <mat-form-field>
        <mat-label> Degvielas kods </mat-label>
        <input matInput [formField]="form.type" />
      </mat-form-field>
    </section>

    <section>
      <mat-form-field>
        <mat-label> Mērvienības </mat-label>
        <input matInput [formField]="form.units" />
      </mat-form-field>
    </section>

    <section>
      <mat-form-field>
        <mat-label>Apraksts</mat-label>
        <input matInput [formField]="form.description" />
      </mat-form-field>
    </section>
  </mat-dialog-content>

  <mat-dialog-actions>
    <button matButton="elevated" [disabled]="form().valid() === false || form().dirty() === false">Saglabāt</button>
    <button matButton mat-dialog-close type="button">Atcelt</button>
  </mat-dialog-actions>
</form>
