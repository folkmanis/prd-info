<mat-list dense>
  @for (session of sessions(); track $index) {
    <mat-list-item>
      <button
        matIconButton
        (click)="deleteSession.emit([session._id])"
        [disabled]="disabled() || session._id === currentSession()"
      >
        <mat-icon> delete </mat-icon>
      </button>
      {{ session.lastSeen.date | date: 'full' }} - {{ session.lastSeen.ip }}
    </mat-list-item>
  }
</mat-list>

<ng-container actions>
  <button matButton="elevated" appConfirmation (appConfirmedClick)="onDeleteAll()" [disabled]="deleteAllDisabled()">
    Izbeigt visas
  </button>
</ng-container>
