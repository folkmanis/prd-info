<mat-drawer-container>
  <mat-drawer appDrawerButton>
    @if (productsSummary$ | async; as productsSummary) {
      <app-products-summary [productsSummary]="productsSummary" (productHover)="highlited = $event" />
    }
  </mat-drawer>

  <mat-drawer-content>
    @if (data$ | async; as data) {
      <app-job-table #jobTable [jobs]="data" [highlitedJobId]="highlited" (jobChange)="onUpdateJob($event)" />
      <app-new-job-button (fileList)="onFileDrop($event)" [class.rised]="jobTable.scrollTopVisible()" />
    }
  </mat-drawer-content>
</mat-drawer-container>
