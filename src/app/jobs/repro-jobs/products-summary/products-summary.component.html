<ul>
  @for (product of productsSummary(); track product.name) {
    <li (mouseenter)="onMouseEnter(product.name)" (mouseleave)="onMouseLeave()">
      <span>
        {{ product.name }}
      </span>
      <span class="amount">
        <span class="count">
          {{ product.count }}
        </span>
        <span> &nbsp;{{ product.units }} </span>
      </span>
    </li>
  }
</ul>
