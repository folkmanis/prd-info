<app-simple-list-container plusButton editorWidth="50%">
  <mat-card>
    <mat-card-content>
      <app-materials-filter [(filter)]="userFilter" />
    </mat-card-content>
  </mat-card>

  @let categories = productCategories();
  <table mat-table [dataSource]="materials.hasValue() ? materials.value() : []" [trackBy]="trackByFn">
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let material; columns: displayedColumns"
      [routerLink]="[material._id]"
      routerLinkActive="selected"
      [class.disabled]="material.inactive"
    ></tr>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nosaukums</th>
      <td mat-cell *matCellDef="let material">
        {{ material.name }}
      </td>
    </ng-container>

    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Grupa</th>
      <td mat-cell *matCellDef="let material">
        {{ categoryDescription(material, categories) }}
      </td>
    </ng-container>
  </table>
</app-simple-list-container>
